<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>JEJAK Mobile PWA</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:0;padding:0;display:flex;flex-direction:column;height:100vh}
    header{background:#0b5; padding:12px;color:#023}
    #viewer{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
    video{width:100%;max-width:480px;border-radius:8px}
    #result{padding:12px}
    button{padding:8px 12px;margin:6px}
  </style>
</head>
<body>
  <header>
    <h1>JEJAK Scanner (PWA)</h1>
  </header>
  <div id="viewer">
    <video id="video" playsinline autoplay></video>
    <canvas id="canvas" style="display:none"></canvas>
    <div id="result">Scan a QR code on the document.</div>
    <div>
      <button id="start">Start Camera</button>
      <button id="stop">Stop</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
