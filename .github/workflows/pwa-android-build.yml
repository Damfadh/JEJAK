name: Build PWA and (optionally) Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-pwa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: mobile
        run: npm ci || npm install
      - name: Build PWA
        working-directory: mobile
        run: npm run build
      - name: Archive PWA
        uses: actions/upload-artifact@v4
        with:
          name: pwa-www
          path: mobile/www

  build-android:
    needs: build-pwa
    if: "exists('android')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
      - name: Build Android APK
        run: |
          cd android
          if [ -n "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "Setting up keystore from secrets"
            mkdir -p android/keystore
            echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/keystore/keystore.jks
            echo "RELEASE_STORE_FILE=keystore/keystore.jks" >> android/gradle.properties
            echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/gradle.properties
            echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/gradle.properties
            echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/gradle.properties
          else
            echo "No keystore provided; building unsigned APK"
          fi
          ./gradlew assembleRelease --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jejak-android-apk
          path: android/app/build/outputs/**/*.apk
