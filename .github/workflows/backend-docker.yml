name: Build backend Docker image and run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Build Docker image
        run: |
          docker build -t jejak-backend:ci ./backend
      - name: Run tests inside container
        run: |
          docker run --rm jejak-backend:ci /bin/sh -c "python -m pip install -r /app/requirements.txt && pytest -q"
        env:
          PYTHONPATH: /app
