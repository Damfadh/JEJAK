version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jejak
      POSTGRES_PASSWORD: jejak_pass
      POSTGRES_DB: jejak
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://jejak:jejak_pass@postgres:5432/jejak
      API_KEY: ${API_KEY:-}
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  signer:
    build: ./demo/signer
    depends_on:
      - backend
      - postgres
    volumes:
      - ./artifacts:/artifacts
      - ./:/workspace:ro
    environment:
      PYTHONUNBUFFERED: 1
    command: ["/bin/sh", "-c", "python /workspace/scripts/batch_sign.py --csv /workspace/tests/fixtures/sample_batch.csv --out /artifacts/sample_signed.zip --gen-key-out /artifacts/ci_key.b64"]

volumes:
  pgdata:
    driver: local
